<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통신클럽 어드민</title>
<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pr:#2563EB;--g1:#F8FAFC;--g2:#F1F5F9;--g3:#E2E8F0;--g4:#94A3B8;--g6:#475569;--g8:#1E293B;--rd:#DC2626;--gn:#16A34A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f1f5f9;color:var(--g8);font-size:14px}

/* ── 로그인 ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a,#2563EB);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{font-size:22px;font-weight:900;color:var(--pr);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--g4);margin-bottom:28px}
.lf{margin-bottom:14px;text-align:left}
.lf label{font-size:12px;font-weight:600;color:var(--g6);display:block;margin-bottom:6px}
.lf input{width:100%;border:1.5px solid var(--g3);border-radius:8px;padding:11px 14px;font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.lf input:focus{border-color:var(--pr)}
.login-btn{width:100%;background:var(--pr);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s;font-family:inherit}
.login-btn:hover{background:#1D4ED8}
.login-err{color:var(--rd);font-size:12px;margin-top:10px;min-height:18px}

/* ── 레이아웃 ── */
#app{display:none}
.topbar{background:#1e293b;height:54px;display:flex;align-items:center;padding:0 20px;gap:4px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-logo{font-size:15px;font-weight:700;color:#fff;margin-right:12px;white-space:nowrap}
.tab-btn{padding:7px 14px;border-radius:6px;border:none;background:none;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab-btn.on{background:rgba(255,255,255,.12);color:#fff}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.logout-btn{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:none;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit}
.logout-btn:hover{color:#fff}

.wrap{max-width:1100px;margin:0 auto;padding:20px}

/* ── 카드 ── */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;background:#fafbfc}
.card-head-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:18px}

/* ── 버튼 ── */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:var(--pr);color:#fff}.btn-blue:hover{background:#1D4ED8}
.btn-green{background:#16A34A;color:#fff}.btn-green:hover{background:#15803d}
.btn-gray{background:var(--g2);color:var(--g8)}.btn-gray:hover{background:var(--g3)}
.btn-red{background:#fee2e2;color:var(--rd)}.btn-red:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:5px}

/* ── 필터 바 ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:16px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--g4);letter-spacing:.2px}
.fg input,.fg select{border:1.5px solid var(--g3);border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;color:var(--g8);background:#fff}
.fg input:focus,.fg select:focus{border-color:var(--pr)}
.date-btns{display:flex;gap:4px}
.date-btn{padding:7px 11px;border:1.5px solid var(--g3);border-radius:6px;background:#fff;font-size:12px;font-weight:600;color:var(--g6);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.date-btn:hover,.date-btn.on{border-color:var(--pr);background:var(--pr);color:#fff}

/* ── 집계 ── */
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sum-card{background:#fff;border:1.5px solid var(--g2);border-radius:8px;padding:10px 14px;text-align:center;min-width:80px}
.sum-num{font-size:20px;font-weight:900;line-height:1.1}
.sum-lbl{font-size:10px;color:var(--g4);margin-top:2px}

/* ── 테이블 ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--g2)}
table.dtbl{width:100%;border-collapse:collapse;font-size:13px}
table.dtbl thead tr{background:var(--pr)}
table.dtbl th{padding:10px 12px;color:#fff;font-size:12px;font-weight:700;text-align:left;white-space:nowrap}
table.dtbl tbody tr{border-bottom:1px solid var(--g2)}
table.dtbl tbody tr:hover{background:#f8faff}
table.dtbl td{padding:9px 12px;vertical-align:middle}
.empty-row td{text-align:center;color:var(--g4);padding:36px;font-size:13px}

.status-sel{border:1.5px solid var(--g3);border-radius:5px;padding:4px 6px;font-size:11px;font-family:inherit;outline:none;cursor:pointer;font-weight:700;min-width:96px}
.s0{border-color:#3b82f6;color:#1d4ed8;background:#eff6ff}
.s1{border-color:#f59e0b;color:#92400e;background:#fef9c3}
.s2{border-color:#8b5cf6;color:#5b21b6;background:#f5f3ff}
.s3{border-color:#10b981;color:#065f46;background:#ecfdf5}
.s4{border-color:#f97316;color:#7c2d12;background:#fff7ed}
.s5{border-color:#06b6d4;color:#164e63;background:#ecfeff}
.s6{border-color:#16a34a;color:#14532d;background:#dcfce7}

.memo-inp{border:1.5px solid var(--g3);border-radius:5px;padding:4px 8px;font-size:12px;font-family:inherit;outline:none;width:130px}
.memo-inp:focus{border-color:var(--pr)}

/* 페이지네이션 */
.pager{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px;flex-wrap:wrap}
.pg-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--g3);background:#fff;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;color:var(--g6)}
.pg-btn:hover,.pg-btn.on{border-color:var(--pr);background:var(--pr);color:#fff}
.pg-info{font-size:12px;color:var(--g4);margin:0 6px}

/* 설정 탭 */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--g6);margin-bottom:5px}
.field input,.field textarea{width:100%;border:1.5px solid var(--g3);border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;color:var(--g8);transition:border .15s}
.field input:focus,.field textarea:focus{border-color:var(--pr)}
.field textarea{resize:vertical;min-height:60px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.rv-item{border:1.5px solid var(--g3);border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.rv-item.yc{border-color:#FDE68A;background:#FEFCE8}
.rv-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:#fee2e2;border:none;cursor:pointer;color:var(--rd);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center}
.add-btn{width:100%;padding:9px;border:1.5px dashed #cbd5e1;border-radius:7px;background:none;cursor:pointer;font-size:13px;color:var(--g4);font-family:inherit;font-weight:600;transition:all .15s;margin-top:4px}
.add-btn:hover{border-color:var(--pr);color:var(--pr);background:#EFF6FF}
.rt-item{display:grid;grid-template-columns:1fr 1.5fr 72px 28px;gap:8px;align-items:center;margin-bottom:8px}
.rt-item input{border:1.5px solid var(--g3);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none}
.rt-item input:focus{border-color:var(--pr)}
.rt-del{width:28px;height:28px;border-radius:50%;background:#fee2e2;border:none;cursor:pointer;color:var(--rd);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
.rt-hdr{display:grid;grid-template-columns:1fr 1.5fr 72px 28px;gap:8px;margin-bottom:6px}
.rt-hdr span{font-size:11px;font-weight:600;color:var(--g4);padding:0 10px}
.photo-upload-box{border:2px dashed #FDE68A;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;background:#FEFCE8;min-height:70px;display:flex;align-items:center;justify-content:center}
.photo-upload-box:hover{border-color:#F59E0B;background:#FEF3C7}
.photo-placeholder{display:flex;align-items:center;gap:8px;color:var(--g4);font-size:13px}
.photo-preview{position:relative;display:inline-block}
.photo-preview img{width:64px;height:64px;border-radius:8px;object-fit:cover;display:block}
.photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--rd);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
.dl-box-label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:10px;letter-spacing:.5px}
.dl-note{color:#64748b;font-size:12px;margin-top:10px;line-height:1.7}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:700px){
  .row4{grid-template-columns:1fr 1fr}
  table.dtbl{font-size:11px}
  table.dtbl th,table.dtbl td{padding:7px 6px}
  .memo-inp{width:80px}
  .filter-bar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📡 통신클럽</div>
    <div class="login-sub">어드민 패널 로그인</div>
    <div class="lf"><label>아이디</label><input id="l-id" type="text" placeholder="admin" autocomplete="username"></div>
    <div class="lf"><label>비밀번호</label><input id="l-pw" type="password" placeholder="비밀번호" autocomplete="current-password"></div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="topbar">
    <span class="topbar-logo">📡 통신클럽 어드민</span>
    <button class="tab-btn on" id="tab-btn-db" onclick="showTab('db')">📋 접수 DB</button>
    <button class="tab-btn" id="tab-btn-cfg" onclick="showTab('cfg')">⚙️ 사이트 설정</button>
    <div class="topbar-right">
      <button class="btn btn-blue btn-sm" onclick="window.open('../index.html','_blank')">🔗 랜딩 미리보기</button>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- ══ DB 탭 ══ -->
  <div id="pane-db" class="wrap">
    <div class="card">
      <div class="card-head">
        <div class="card-head-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--pr)" stroke-width="2.2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          접수 현황 조회
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-green btn-sm" onclick="exportExcel()">⬇ 엑셀 저장</button>
          <button class="btn btn-gray btn-sm" onclick="applyFilter()">새로고침</button>
        </div>
      </div>
      <div class="card-body">

        <div class="filter-bar">
          <div class="fg">
            <label>기간 선택</label>
            <div class="date-btns">
              <button class="date-btn on" onclick="setPreset('today',this)">당일</button>
              <button class="date-btn" onclick="setPreset('yesterday',this)">전일</button>
              <button class="date-btn" onclick="setPreset('month',this)">당월</button>
              <button class="date-btn" onclick="setPreset('lastmonth',this)">전월</button>
              <button class="date-btn" onclick="setPreset('all',this)">전체</button>
            </div>
          </div>
          <div class="fg"><label>시작 날짜</label><input type="date" id="f-from"></div>
          <div class="fg"><label>종료 날짜</label><input type="date" id="f-to"></div>
          <div class="fg"><label>검색 (이름·연락처)</label><input type="text" id="f-search" placeholder="김철수 / 010-1234" style="min-width:170px"></div>
          <div class="fg">
            <label>처리 상태</label>
            <select id="f-status">
              <option value="">전체</option>
              <option>상담</option><option>부재</option><option>문자발송</option>
              <option>청약</option><option>필수항목 안내</option><option>설치 완료</option><option>송금 완료</option>
            </select>
          </div>
          <button class="btn btn-blue" onclick="applyFilter()" style="align-self:flex-end">조회</button>
        </div>

        <div class="summary-row" id="sum-row"></div>

        <div class="tbl-wrap">
          <table class="dtbl">
            <thead>
              <tr>
                <th>No</th><th>접수일시</th><th>성함</th><th>연락처</th>
                <th>희망통신사</th><th>연락시간</th><th>처리상태</th><th>메모</th><th>삭제</th>
              </tr>
            </thead>
            <tbody id="db-tbody"></tbody>
          </table>
        </div>
        <div class="pager" id="pager"></div>
      </div>
    </div>
  </div>

  <!-- ══ 설정 탭 ══ -->
  <div id="pane-cfg" class="wrap" style="display:none">

    <!-- 로그인 계정 -->
    <div class="card">
      <div class="card-head"><div class="card-head-title">🔑 로그인 계정 변경</div></div>
      <div class="card-body">
        <div class="row3">
          <div class="field"><label>아이디</label><input id="c-lid" type="text"></div>
          <div class="field"><label>새 비밀번호</label><input id="c-lpw" type="password"></div>
          <div class="field"><label>비밀번호 확인</label><input id="c-lpw2" type="password"></div>
        </div>
        <button class="btn btn-blue btn-sm" onclick="saveLogin()">저장</button>
      </div>
    </div>

    <!-- 기본 설정 -->
    <div class="card">
      <div class="card-head"><div class="card-head-title">📞 기본 설정</div></div>
      <div class="card-body">
        <div class="field" style="max-width:240px"><label>대표 전화번호</label><input id="f-phone" type="text" value="0000-0000"></div>
        <button class="btn btn-blue btn-sm" style="margin-top:4px" onclick="saveSection('phone')">저장</button>
      </div>
    </div>

    <!-- 히어로 -->
    <div class="card">
      <div class="card-head"><div class="card-head-title">🌟 히어로 섹션</div></div>
      <div class="card-body">
        <div class="field"><label>헤드라인 강조 (파란색)</label><input id="f-h1-em" type="text" value="최저 요금"></div>
        <div class="field"><label>헤드라인 중간 텍스트</label><input id="f-h1-mid" type="text" value="으로 인터넷·TV 가입,"></div>
        <div class="field"><label>헤드라인 강조2 (빨간색)</label><input id="f-h1-strong" type="text" value="현금 최대 48만원 + α"></div>
        <div class="field"><label>헤드라인 끝 텍스트</label><input id="f-h1-end" type="text" value="받으세요"></div>
        <div class="field"><label>서브 텍스트 (줄바꿈: Enter)</label><textarea id="f-hero-sub" rows="2">통신클럽은 SK·KT·LG 공식 대리점입니다.
전담 매니저가 딱 맞는 요금제를 찾아드립니다.</textarea></div>
        <button class="btn btn-blue btn-sm" style="margin-top:4px" onclick="saveSection('hero')">저장</button>
      </div>
    </div>

    <!-- 통계 -->
    <div class="card">
      <div class="card-head"><div class="card-head-title">📊 통계 수치</div></div>
      <div class="card-body">
        <div class="row4">
          <div class="field"><label>값 1</label><input id="f-stat0v" type="text" value="98,000+"></div>
          <div class="field"><label>레이블 1</label><input id="f-stat0l" type="text" value="누적 가입자"></div>
          <div class="field"><label>값 2</label><input id="f-stat1v" type="text" value="4.9점"></div>
          <div class="field"><label>레이블 2</label><input id="f-stat1l" type="text" value="평균 만족도"></div>
        </div>
        <div class="row4" style="margin-top:8px">
          <div class="field"><label>값 3</label><input id="f-stat2v" type="text" value="48만원+α"></div>
          <div class="field"><label>레이블 3</label><input id="f-stat2l" type="text" value="최대 현금"></div>
          <div class="field"><label>값 4</label><input id="f-stat3v" type="text" value="당일"></div>
          <div class="field"><label>레이블 4</label><input id="f-stat3l" type="text" value="현금 지급"></div>
        </div>
        <button class="btn btn-blue btn-sm" style="margin-top:8px" onclick="saveSection('stats')">저장</button>
      </div>
    </div>

    <!-- 요금 비교 테이블 -->
    <div class="card">
      <div class="card-head"><div class="card-head-title">📋 요금 비교 테이블</div></div>
      <div class="card-body">
        <div style="font-size:11px;font-weight:700;color:var(--g4);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--g2)">SK브로드밴드</div>
        <div class="row4" style="margin-bottom:14px">
          <div class="field"><label>로고 파일명</label><input id="f-tbl0-logo" type="text" value="SK-나비.png"></div>
          <div class="field"><label>상품명</label><input id="f-tbl0-product" type="text" value="인터넷 1G"></div>
          <div class="field"><label>정가</label><input id="f-tbl0-orig" type="text" value="38,500원"></div>
          <div class="field"><label>할인가</label><input id="f-tbl0-final" type="text" value="27,500원"></div>
        </div>
        <div class="field" style="max-width:120px;margin-bottom:20px"><label>지원금(만원)</label><input id="f-tbl0-support" type="text" value="30"></div>

        <div style="font-size:11px;font-weight:700;color:var(--g4);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--g2)">KT</div>
        <div class="row4" style="margin-bottom:14px">
          <div class="field"><label>로고 파일명</label><input id="f-tbl1-logo" type="text" value="KT_Logo.png"></div>
          <div class="field"><label>상품명</label><input id="f-tbl1-product" type="text" value="인터넷 1G"></div>
          <div class="field"><label>정가</label><input id="f-tbl1-orig" type="text" value="38,500원"></div>
          <div class="field"><label>할인가</label><input id="f-tbl1-final" type="text" value="27,500원"></div>

<script>
/* ─────────── 로그인 ─────────── */
var K_ID='tc_aid', K_PW='tc_apw', K_SS='tc_sess';
var DI='admin', DP='1234';
var getAId=function(){return localStorage.getItem(K_ID)||DI;};
var getAPw=function(){return localStorage.getItem(K_PW)||DP;};

function doLogin(){
  var id=document.getElementById('l-id').value.trim();
  var pw=document.getElementById('l-pw').value;
  if(id===getAId()&&pw===getAPw()){
    sessionStorage.setItem(K_SS,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    bootApp();
  } else {
    document.getElementById('login-err').textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
  }
}
function doLogout(){sessionStorage.removeItem(K_SS);location.reload();}
['l-pw','l-id'].forEach(function(id){
  document.getElementById(id).addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
});
if(sessionStorage.getItem(K_SS)==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

/* ─────────── 탭 ─────────── */
function showTab(name){
  document.getElementById('pane-db').style.display  = name==='db'  ? '' : 'none';
  document.getElementById('pane-cfg').style.display = name==='cfg' ? '' : 'none';
  document.getElementById('tab-btn-db').classList.toggle('on', name==='db');
  document.getElementById('tab-btn-cfg').classList.toggle('on', name==='cfg');
  if(name==='cfg') initCfgForm();
  if(name==='db')  applyFilter();
}

function bootApp(){
  setPreset('today', document.querySelector('.date-btn.on'));
  applyFilter();
}

/* ─────────── Supabase ─────────── */
var _SB = supabase.createClient(
  'https://dnyaeqexbuxdllxsxpmu.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRueWFlcWV4YnV4ZGxseHN4cG11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTAyNzIsImV4cCI6MjA5MTEyNjI3Mn0.F-pmYxKxu4PhmXiKfigsXIhCtYUQ3T75gGvHghfCLy8'
);

/* ─────────── DB ─────────── */
var allRows=[], filtered=[], PAGE=20, cur=1;
var SL=['상담','부재','문자발송','청약','필수항목 안내','설치 완료','송금 완료'];
var SC=['s0','s1','s2','s3','s4','s5','s6'];
var SC_COLOR=['#3b82f6','#f59e0b','#8b5cf6','#10b981','#f97316','#06b6d4','#16a34a'];

async function applyFilter(){
  var from = document.getElementById('f-from').value;
  var to   = document.getElementById('f-to').value;
  var q    = document.getElementById('f-search').value.trim().toLowerCase();
  var st   = document.getElementById('f-status').value;
  document.getElementById('db-tbody').innerHTML='<tr class="empty-row"><td colspan="9">조회 중...</td></tr>';
  try{
    var query=_SB.from('submissions').select('*').order('created_at',{ascending:false});
    if(from) query=query.gte('created_at',from+'T00:00:00');
    if(to)   query=query.lte('created_at',to+'T23:59:59');
    if(st)   query=query.eq('status',st);
    var res=await query;
    allRows=res.data||[];
  }catch(e){allRows=[];showToast('DB 조회 오류');}
  filtered=q?allRows.filter(function(r){return((r.name||'')+(r.phone||'')).toLowerCase().indexOf(q)>=0;}):allRows.slice();
  cur=1; renderSum(); renderTbl();
}

function renderSum(){
  var cnt={};SL.forEach(function(s){cnt[s]=0;});
  filtered.forEach(function(r){if(cnt[r.status]!==undefined)cnt[r.status]++;});
  var h='<div class="sum-card"><div class="sum-num" style="color:var(--pr)">'+filtered.length+'</div><div class="sum-lbl">전체</div></div>';
  SL.forEach(function(s,i){h+='<div class="sum-card"><div class="sum-num" style="color:'+SC_COLOR[i]+'">'+cnt[s]+'</div><div class="sum-lbl">'+s+'</div></div>';});
  document.getElementById('sum-row').innerHTML=h;
}

function renderTbl(){
  var tbody=document.getElementById('db-tbody');
  var s=(cur-1)*PAGE, pg=filtered.slice(s,s+PAGE);
  if(!pg.length){tbody.innerHTML='<tr class="empty-row"><td colspan="9">조회된 접수 건이 없습니다.</td></tr>';document.getElementById('pager').innerHTML='';return;}
  tbody.innerHTML=pg.map(function(r,i){
    var no=filtered.length-s-i;
    var dt=r.created_at?r.created_at.replace('T',' ').slice(0,16):'-';
    var si=SL.indexOf(r.status);if(si<0)si=0;
    var opts=SL.map(function(s){return '<option'+(s===r.status?' selected':'')+'>'+s+'</option>';}).join('');
    return '<tr>'
      +'<td style="color:var(--g4);font-size:11px">'+no+'</td>'
      +'<td style="white-space:nowrap;font-size:12px;color:var(--g6)">'+dt+'</td>'
      +'<td style="font-weight:700">'+esc(r.name||'-')+'</td>'
      +'<td style="font-family:monospace;font-size:12px">'+esc(r.phone||'-')+'</td>'
      +'<td style="font-weight:700;color:var(--pr)">'+esc(r.carrier||'-')+'</td>'
      +'<td style="font-size:12px;color:var(--g6)">'+esc(r.call_time||'-')+'</td>'
      +'<td><select class="status-sel '+SC[si]+'" onchange="updStatus('+r.id+',this)">'+opts+'</select></td>'
      +'<td><input class="memo-inp" value="'+esc(r.memo||'')+'" placeholder="메모..." onblur="updMemo('+r.id+',this)"></td>'
      +'<td><button class="btn btn-red btn-sm" onclick="delRow('+r.id+')">삭제</button></td>'
      +'</tr>';
  }).join('');
  renderPager();
}

function renderPager(){
  var tot=Math.ceil(filtered.length/PAGE);
  if(tot<=1){document.getElementById('pager').innerHTML='<span class="pg-info">총 '+filtered.length+'건</span>';return;}
  var h='';
  if(cur>1)h+='<button class="pg-btn" onclick="goPg('+(cur-1)+')">‹</button>';
  var s2=Math.max(1,cur-2),e=Math.min(tot,cur+2);
  for(var p=s2;p<=e;p++)h+='<button class="pg-btn'+(p===cur?' on':'')+'" onclick="goPg('+p+')">'+p+'</button>';
  if(cur<tot)h+='<button class="pg-btn" onclick="goPg('+(cur+1)+')">›</button>';
  h+='<span class="pg-info">총 '+filtered.length+'건 / '+tot+'페이지</span>';
  document.getElementById('pager').innerHTML=h;
}
function goPg(p){cur=p;renderTbl();window.scrollTo(0,200);}

async function updStatus(id,sel){
  var si=SL.indexOf(sel.value);if(si<0)si=0;
  sel.className='status-sel '+SC[si];
  await _SB.from('submissions').update({status:sel.value}).eq('id',id);
  var row=allRows.find(function(r){return r.id===id;});if(row)row.status=sel.value;
  renderSum();
}
async function updMemo(id,inp){
  await _SB.from('submissions').update({memo:inp.value}).eq('id',id);
  var row=allRows.find(function(r){return r.id===id;});if(row)row.memo=inp.value;
}
async function delRow(id){
  if(!confirm('이 접수 건을 삭제하시겠습니까?'))return;
  await _SB.from('submissions').delete().eq('id',id);
  allRows=allRows.filter(function(r){return r.id!==id;});
  filtered=filtered.filter(function(r){return r.id!==id;});
  renderSum();renderTbl();showToast('삭제되었습니다.');
}

function setPreset(preset,btn){
  document.querySelectorAll('.date-btn').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var now=new Date(),fmt=function(d){return d.toISOString().slice(0,10);},from='',to='';
  if(preset==='today'){from=to=fmt(now);}
  else if(preset==='yesterday'){var y=new Date(now);y.setDate(y.getDate()-1);from=to=fmt(y);}
  else if(preset==='month'){from=fmt(new Date(now.getFullYear(),now.getMonth(),1));to=fmt(now);}
  else if(preset==='lastmonth'){from=fmt(new Date(now.getFullYear(),now.getMonth()-1,1));to=fmt(new Date(now.getFullYear(),now.getMonth(),0));}
  document.getElementById('f-from').value=from;document.getElementById('f-to').value=to;
}

function exportExcel(){

  var wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:18},{wch:10},{wch:16},{wch:12},{wch:16},{wch:14},{wch:24}];

  sv('f-h1-end',c.hero&&c.hero.headline_end);
  sv('f-hero-sub',(c.hero&&c.hero.sub||'').replace(/<br>/g,'\n'));
  if(c.stats&&c.stats.length){
    c.stats.forEach(function(st,i){
      sv('f-stat'+i+'v', st.value);
      sv('f-stat'+i+'l', st.label);
    });
  }
  if(c.table&&c.table.length){
    c.table.forEach(function(row,i){
      sv('f-tbl'+i+'-logo',    row.logo);
      sv('f-tbl'+i+'-product', row.product);
      sv('f-tbl'+i+'-orig',    row.orig);
      sv('f-tbl'+i+'-final',   row.final);
      sv('f-tbl'+i+'-support', row.support);
    });
  }
  if(c.reviews_white&&c.reviews_white.length){
    var rwItems=document.querySelectorAll('#rw-wrap .rv-item');
    c.reviews_white.forEach(function(r,i){
      if(i>=rwItems.length) return;
      var ins=rwItems[i].querySelectorAll('input'),ta=rwItems[i].querySelector('textarea');
      if(ins[0])ins[0].value=r.initial||'';
      if(ins[1])ins[1].value=r.tag||'';
      if(ta)ta.value=r.text||'';
      if(ins[2])ins[2].value=r.name||'';
      if(ins[3])ins[3].value=r.date||'';
    });
  }
  if(c.reviews_yellow&&c.reviews_yellow.length){
    var ryItems=document.querySelectorAll('#ry-wrap .rv-item');
    c.reviews_yellow.forEach(function(r,i){
      if(i>=ryItems.length) return;

      var ta=ryItems[i].querySelector('textarea');
      if(allInputs[0])allInputs[0].value=r.initial||'';
      if(allInputs[1])allInputs[1].value=r.loc||'';
      if(allInputs[2])allInputs[2].value=r.quote||'';
      if(ta)ta.value=r.text||'';
      if(allInputs[3])allInputs[3].value=r.name||'';
      if(allInputs[4])allInputs[4].value=r.date||'';

          prev.querySelector('img').src=r.photo;

/* ─────────── Supabase config 저장 ─────────── */
async function sbSaveConfig(patch){
  try{
    /* 현재 Supabase config 읽기 */
    var res = await _SB.from('site_config').select('data').eq('id',1).single();
    var current = (res.data && res.data.data) ? res.data.data : {};
    /* 패치 병합 */
    var merged = Object.assign({}, current, patch);
    /* upsert */
    await _SB.from('site_config').upsert({id:1, data:merged, updated_at:new Date().toISOString()});
    return true;
  }catch(e){ console.error('config 저장 오류',e); return false; }
}

      address:  document.getElementById('f-addr').value,
      email:    document.getElementById('f-email').value,
      copyright:document.getElementById('f-copy').value

  }
  var ok = await sbSaveConfig(patch);
  var labels={phone:'전화번호',hero:'히어로 섹션',stats:'통계 수치',table:'요금 테이블',reviews_white:'흰색 후기',reviews_yellow:'노란색 후기',footer:'푸터 정보'};

/* ─────────── 사진 업로드 ─────────── */
function triggerPhotoUpload(box){
  box.querySelector('input[type=file]').click();
}

async function uploadPhoto(input){
  var file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ showToast('파일 크기가 2MB를 초과합니다.'); return; }
  var box = input.closest('.photo-upload-box');
  box.querySelector('.photo-placeholder').innerHTML='<span style="color:var(--pr)">업로드 중...</span>';
  try{
    var ext = file.name.split('.').pop();
    var path = 'review-' + Date.now() + '.' + ext;
    var res = await _SB.storage.from('review-photos').upload(path, file, {cacheControl:'3600', upsert:false});
    if(res.error) throw res.error;
    var urlRes = _SB.storage.from('review-photos').getPublicUrl(res.data.path);
    var url = urlRes.data.publicUrl;
    /* 미리보기 표시 */
    var prev = box.querySelector('.photo-preview');
    prev.querySelector('img').src = url;
    prev.style.display = 'inline-block';
    box.querySelector('.photo-placeholder').style.display = 'none';
    /* URL을 input에 저장 */
    input.dataset.url = url;
    showToast('사진 업로드 완료!');
  }catch(e){
    box.querySelector('.photo-placeholder').innerHTML='<span style="color:var(--rd)">업로드 실패</span>';
    showToast('업로드 실패: ' + (e.message||'다시 시도해주세요.'));
  }
}

function delPhoto(btn){
  var box = btn.closest('.photo-upload-box');
  var prev = box.querySelector('.photo-preview');
  prev.querySelector('img').src='';
  prev.style.display='none';
  var fi = box.querySelector('input[type=file]');
  fi.value=''; fi.dataset.url='';
  box.querySelector('.photo-placeholder').style.display='flex';
}

/* ─────────── 유틸 ─────────── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
