<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통신클럽 어드민 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pr:#2563EB;--pd:#1D4ED8;--rd:#DC2626;--g3:#E2E8F0;--g4:#94A3B8;--g6:#475569;--g8:#1E293B}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#EFF6FF,#DBEAFE 50%,#E0F2FE);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.login-wrap{width:100%;max-width:420px}

/* 로고 */
.login-logo{text-align:center;margin-bottom:28px}
.logo-icon{width:52px;height:52px;background:var(--pr);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.logo-title{font-size:22px;font-weight:900;color:var(--g8)}
.logo-sub{font-size:13px;color:var(--g4);margin-top:4px}

/* 카드 */
.login-card{background:#fff;border-radius:20px;padding:36px 32px;box-shadow:0 8px 40px rgba(37,99,235,.12)}
.card-title{font-size:17px;font-weight:700;color:var(--g8);margin-bottom:24px;text-align:center}

/* 폼 */
.fg{margin-bottom:16px}
.fl{font-size:12px;font-weight:700;color:var(--g6);margin-bottom:6px;display:block}
.fi-wrap{position:relative}
.fi{width:100%;border:1.5px solid var(--g3);border-radius:10px;padding:13px 44px 13px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s;color:var(--g8);background:#F8FAFC}
.fi:focus{border-color:var(--pr);background:#fff}
.fi::placeholder{color:var(--g4)}
.fi-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--g4)}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--g4);padding:0;display:flex;align-items:center}
.pw-toggle:hover{color:var(--g6)}

/* 에러 */
.error-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--rd);margin-bottom:16px;display:none;align-items:center;gap:8px}
.error-msg.show{display:flex}

/* 로그인 버튼 */
.login-btn{width:100%;background:linear-gradient(135deg,var(--pr),var(--pd));color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

/* 로딩 스피너 */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.login-btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 안내 */
.login-hint{text-align:center;font-size:12px;color:var(--g4);margin-top:16px;line-height:1.6}

/* 잠금 오버레이 */
.lock-overlay{display:none;text-align:center;padding:20px 0}
.lock-icon{width:56px;height:56px;background:#FEF2F2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.lock-title{font-size:16px;font-weight:700;color:var(--rd);margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--g4);line-height:1.6}
.lock-timer{font-size:20px;font-weight:900;color:var(--rd);margin:10px 0}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M1 6l11 7L23 6"/><path d="M1 6a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2z"/></svg>
    </div>
    <div class="logo-title">통신클럽</div>
    <div class="logo-sub">관리자 전용 페이지</div>
  </div>

  <div class="login-card">
    <!-- 로그인 폼 -->
    <div id="loginForm">
      <div class="card-title">어드민 로그인</div>

      <div class="error-msg" id="errorMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">아이디 또는 비밀번호가 올바르지 않습니다.</span>
      </div>

      <div class="fg">
        <label class="fl">아이디</label>
        <div class="fi-wrap">
          <input class="fi" id="userId" type="text" placeholder="아이디 입력" autocomplete="username">
          <span class="fi-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
        </div>
      </div>

      <div class="fg">
        <label class="fl">비밀번호</label>
        <div class="fi-wrap">
          <input class="fi" id="userPw" type="password" placeholder="비밀번호 입력" autocomplete="current-password">
          <button class="pw-toggle" onclick="togglePw()" type="button" id="pwToggle">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="doLogin()">
        <div class="login-btn-inner">
          <div class="spinner" id="spinner"></div>
          <span id="loginBtnText">로그인</span>
        </div>
      </button>

      <div class="login-hint">
        로그인 5회 실패 시 30분 잠금됩니다.<br>
        계정 문의: 관리자에게 연락하세요.
      </div>
    </div>

    <!-- 잠금 화면 -->
    <div class="lock-overlay" id="lockScreen">
      <div class="lock-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="lock-title">로그인 잠금</div>
      <div class="lock-sub">비밀번호 5회 오류로 잠금되었습니다.<br>아래 시간 후 다시 시도해주세요.</div>
      <div class="lock-timer" id="lockTimer">30:00</div>
      <div class="lock-sub">잠금 해제까지 남은 시간</div>
    </div>
  </div>
</div>

<script>
// ── 계정 설정 (여기서 아이디/비밀번호 변경 가능) ──
const ACCOUNTS = [
  { id: 'admin', pw: 'tongsin1234!' },
];

const MAX_FAIL = 5;
const LOCK_MIN = 30;

let failCount = parseInt(sessionStorage.getItem('failCount') || '0');
let lockUntil = parseInt(sessionStorage.getItem('lockUntil') || '0');
let lockTimer = null;

// 잠금 상태 체크
function checkLock() {
  const now = Date.now();
  if (lockUntil > now) {
    showLock(lockUntil - now);
    return true;
  }
  return false;
}

function showLock(ms) {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'block';
  startLockCountdown(ms);
}

function startLockCountdown(ms) {
  clearInterval(lockTimer);
  let remaining = Math.ceil(ms / 1000);
  updateLockTimer(remaining);
  lockTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(lockTimer);
      sessionStorage.removeItem('lockUntil');
      sessionStorage.removeItem('failCount');
      failCount = 0;
      lockUntil = 0;
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    } else {
      updateLockTimer(remaining);
    }
  }, 1000);
}

function updateLockTimer(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  document.getElementById('lockTimer').textContent =
    String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function togglePw() {
  const input = document.getElementById('userPw');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('show');
}

function doLogin() {
  if (checkLock()) return;

  const id = document.getElementById('userId').value.trim();
  const pw = document.getElementById('userPw').value;

  if (!id || !pw) { showError('아이디와 비밀번호를 모두 입력해주세요.'); return; }

  // 로딩
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('loginBtnText').textContent = '확인 중...';
  document.getElementById('errorMsg').classList.remove('show');

  setTimeout(() => {
    const match = ACCOUNTS.find(a => a.id === id && a.pw === pw);
    if (match) {
      sessionStorage.removeItem('failCount');
      sessionStorage.removeItem('lockUntil');
      sessionStorage.setItem('adminAuth', 'true');
      document.getElementById('loginBtnText').textContent = '로그인 성공!';
      setTimeout(() => { window.location.href = 'admin_index.html'; }, 600);
    } else {
      failCount++;
      sessionStorage.setItem('failCount', failCount);
      btn.disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('loginBtnText').textContent = '로그인';

      if (failCount >= MAX_FAIL) {
        lockUntil = Date.now() + LOCK_MIN * 60 * 1000;
        sessionStorage.setItem('lockUntil', lockUntil);
        showLock(LOCK_MIN * 60 * 1000);
      } else {
        showError(`아이디 또는 비밀번호가 올바르지 않습니다. (${failCount}/${MAX_FAIL}회 실패)`);
      }
    }
  }, 700);
}

// 엔터키
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// 초기 잠금 체크
checkLock();
</script>
</body>
</html>
