<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통신클럽 어드민</title>
<script src="../config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
.top{background:#2563EB;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.top-actions{display:flex;gap:10px}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .15s}
.btn-primary{background:#fff;color:#2563EB}
.btn-primary:hover{background:#EFF6FF}
.btn-preview{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-preview:hover{background:rgba(255,255,255,.25)}
.wrap{max-width:860px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px;overflow:hidden}
.card-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;background:#fafbfc}
.card-head-icon{width:32px;height:32px;border-radius:8px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-head-title{font-size:14px;font-weight:700;color:#1e293b}
.card-body{padding:20px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;letter-spacing:.3px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;color:#1e293b;background:#fff;transition:border .15s}
.field input:focus,.field textarea:focus{border-color:#2563EB}
.field textarea{resize:vertical;min-height:70px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* 후기 카드 */
.review-item{border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.review-item.yellow-card{border-color:#FDE68A;background:#FEFCE8}
.review-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:#fee2e2;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:14px;font-weight:700;line-height:1}
.add-btn{width:100%;padding:10px;border:1.5px dashed #cbd5e1;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#64748b;font-family:inherit;font-weight:600;transition:all .15s;margin-top:4px}
.add-btn:hover{border-color:#2563EB;color:#2563EB;background:#EFF6FF}

/* 실시간 접수 */
.rt-item{display:grid;grid-template-columns:1fr 1.6fr 80px 28px;gap:8px;align-items:center;margin-bottom:8px}
.rt-item input{border:1.5px solid #e2e8f0;border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none}
.rt-item input:focus{border-color:#2563EB}
.rt-del{width:28px;height:28px;border-radius:50%;background:#fee2e2;border:none;cursor:pointer;color:#dc2626;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.rt-head-row{display:grid;grid-template-columns:1fr 1.6fr 80px 28px;gap:8px;margin-bottom:6px}
.rt-head-row span{font-size:11px;font-weight:600;color:#94a3b8;padding:0 10px}

/* 다운로드 패널 */
.dl-box{background:#1e293b;border-radius:12px;padding:20px;margin-top:20px}
.dl-box-title{color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:12px;letter-spacing:.5px}
.dl-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-dl{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.btn-dl-main{background:#2563EB;color:#fff}
.btn-dl-main:hover{background:#1D4ED8}
.btn-dl-copy{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-dl-copy:hover{background:rgba(255,255,255,.15)}
.dl-note{color:#64748b;font-size:12px;margin-top:10px;line-height:1.6}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="top">
  <div class="top-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    통신클럽 어드민
  </div>
  <div class="top-actions">
    <button class="btn btn-preview" onclick="window.open('../index.html','_blank')">🔗 랜딩 미리보기</button>
    <button class="btn btn-primary" onclick="downloadConfig()">⬇ config.js 다운로드</button>
  </div>
</div>

<div class="wrap">

  <!-- 기본 설정 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.27 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
      <div class="card-head-title">기본 설정</div>
    </div>
    <div class="card-body">
      <div class="field"><label>대표 전화번호</label><input id="f-phone" type="text" placeholder="0000-0000"></div>
    </div>
  </div>

  <!-- 히어로 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div class="card-head-title">히어로 섹션</div>
    </div>
    <div class="card-body">
      <div class="field"><label>헤드라인 강조 (파란색)</label><input id="f-h1-em" type="text" placeholder="최저 요금"></div>
      <div class="field"><label>헤드라인 중간 텍스트</label><input id="f-h1-mid" type="text" placeholder="으로 인터넷·TV 가입,"></div>
      <div class="field"><label>헤드라인 강조2 (빨간색)</label><input id="f-h1-strong" type="text" placeholder="현금 최대 48만원 + α"></div>
      <div class="field"><label>헤드라인 끝 텍스트</label><input id="f-h1-end" type="text" placeholder="받으세요"></div>
      <div class="field"><label>서브 텍스트 (줄바꿈: \n)</label><textarea id="f-hero-sub" rows="2"></textarea></div>
    </div>
  </div>

  <!-- 통계 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="card-head-title">통계 수치</div>
    </div>
    <div class="card-body">
      <div class="row4" id="stats-wrap"></div>
    </div>
  </div>

  <!-- 요금 비교 테이블 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg></div>
      <div class="card-head-title">요금 비교 테이블</div>
    </div>
    <div class="card-body" id="table-wrap"></div>
  </div>

  <!-- 후기 1줄 (흰색) -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div class="card-head-title">후기 1줄 — 흰색 카드</div>
    </div>
    <div class="card-body">
      <div id="reviews-white-wrap"></div>
      <button class="add-btn" onclick="addReviewWhite()">+ 흰색 후기 추가</button>
    </div>
  </div>

  <!-- 후기 2줄 (노란색) -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon" style="background:#FEFCE8"><svg width="16" height="16" viewBox="0 0 24 24" fill="#CA8A04" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div class="card-head-title">후기 2줄 — 노란색 카드</div>
    </div>
    <div class="card-body">
      <div id="reviews-yellow-wrap"></div>
      <button class="add-btn" onclick="addReviewYellow()">+ 노란색 후기 추가</button>
    </div>
  </div>

  <!-- 실시간 접수 현황 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="card-head-title">실시간 접수 현황 데이터</div>
    </div>
    <div class="card-body">
      <div class="rt-head-row">
        <span>이름</span><span>연락처</span><span>통신사</span><span></span>
      </div>
      <div id="rt-wrap"></div>
      <button class="add-btn" onclick="addRt()">+ 행 추가</button>
    </div>
  </div>

  <!-- 푸터 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="card-head-title">푸터 정보</div>
    </div>
    <div class="card-body">
      <div class="row2">
        <div class="field"><label>사업자등록번호</label><input id="f-biz-no" type="text" placeholder="000-00-00000"></div>
        <div class="field"><label>통신판매업신고번호</label><input id="f-sales-no" type="text" placeholder="제0000-서울-00000호"></div>
      </div>
      <div class="row2">
        <div class="field"><label>주소</label><input id="f-address" type="text" placeholder="서울특별시 OO구 OO로 00"></div>
        <div class="field"><label>저작권 연도</label><input id="f-copyright" type="text" placeholder="2025"></div>
      </div>
    </div>
  </div>

  <!-- 다운로드 -->
  <div class="dl-box">
    <div class="dl-box-title">📦 배포 방법</div>
    <div class="dl-actions">
      <button class="btn-dl btn-dl-main" onclick="downloadConfig()">config.js 다운로드</button>
      <button class="btn-dl btn-dl-copy" onclick="copyConfig()">코드 복사</button>
    </div>
    <div class="dl-note">
      1. <b>config.js 다운로드</b> 클릭<br>
      2. GitHub 레포에 기존 config.js 덮어쓰기 업로드<br>
      3. Vercel이 자동 재배포 → 완료!
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var cfg = (typeof SITE_CONFIG !== 'undefined') ? JSON.parse(JSON.stringify(SITE_CONFIG)) : {
  phone:'0000-0000',
  hero:{headline_em:'최저 요금',headline_mid:'으로 인터넷·TV 가입,',headline_strong:'현금 최대 48만원 + α',headline_end:'받으세요',sub:'통신클럽은 SK·KT·LG 공식 대리점입니다.\n전담 매니저가 딱 맞는 요금제를 찾아드립니다.'},
  stats:[{value:'98,000+',label:'누적 가입자'},{value:'4.9점',label:'평균 만족도'},{value:'48만원+α',label:'최대 현금'},{value:'당일',label:'현금 지급'}],
  table:[{logo:'SK-나비.png',product:'인터넷 1G',orig:'38,500원',final:'27,500원',support:'30'},{logo:'KT_Logo.png',product:'인터넷 1G',orig:'38,500원',final:'27,500원',support:'28'},{logo:'LGU_Logo.png',product:'인터넷 1G',orig:'38,500원',final:'27,500원',support:'26'}],
  reviews_white:[],reviews_yellow:[],
  rtDB:[{name:'박*백',phone:'010-2***-****',carrier:'L*'}],
  footer:{biz_no:'000-00-00000',sales_no:'제0000-서울-00000호',address:'서울특별시 OO구 OO로 00 OO빌딩 0층',copyright:'2025'}
};

/* ── 초기값 채우기 ── */
function init(){
  document.getElementById('f-phone').value = cfg.phone||'';
  document.getElementById('f-h1-em').value = cfg.hero.headline_em||'';
  document.getElementById('f-h1-mid').value = cfg.hero.headline_mid||'';
  document.getElementById('f-h1-strong').value = cfg.hero.headline_strong||'';
  document.getElementById('f-h1-end').value = cfg.hero.headline_end||'';
  document.getElementById('f-hero-sub').value = (cfg.hero.sub||'').replace(/<br>/g,'\n');
  document.getElementById('f-biz-no').value = cfg.footer.biz_no||'';
  document.getElementById('f-sales-no').value = cfg.footer.sales_no||'';
  document.getElementById('f-address').value = cfg.footer.address||'';
  document.getElementById('f-copyright').value = cfg.footer.copyright||'';
  renderStats(); renderTable(); renderReviewsWhite(); renderReviewsYellow(); renderRt();
}

/* ── 통계 ── */
function renderStats(){
  var w=document.getElementById('stats-wrap'); w.innerHTML='';
  (cfg.stats||[]).forEach(function(st,i){
    var d=document.createElement('div');
    d.innerHTML='<div class="field"><label>값 '+(i+1)+'</label><input data-si="'+i+'" data-sk="value" value="'+esc(st.value)+'"></div><div class="field"><label>레이블 '+(i+1)+'</label><input data-si="'+i+'" data-sk="label" value="'+esc(st.label)+'"></div>';
    d.querySelectorAll('input').forEach(function(el){el.addEventListener('input',function(){cfg.stats[+this.dataset.si][this.dataset.sk]=this.value;});});
    w.appendChild(d);
  });
}

/* ── 테이블 ── */
function renderTable(){
  var w=document.getElementById('table-wrap'); w.innerHTML='';
  var carriers=['SK브로드밴드','KT','LG U+'];
  (cfg.table||[]).forEach(function(row,i){
    var d=document.createElement('div');
    d.style.marginBottom='16px';
    d.innerHTML='<div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f1f5f9">'+carriers[i]+' 로우</div>'
      +'<div class="row4">'
      +'<div class="field"><label>로고 파일명</label><input data-ti="'+i+'" data-tk="logo" value="'+esc(row.logo)+'"></div>'
      +'<div class="field"><label>상품명</label><input data-ti="'+i+'" data-tk="product" value="'+esc(row.product)+'"></div>'
      +'<div class="field"><label>정가</label><input data-ti="'+i+'" data-tk="orig" value="'+esc(row.orig)+'"></div>'
      +'<div class="field"><label>할인가</label><input data-ti="'+i+'" data-tk="final" value="'+esc(row.final)+'"></div>'
      +'</div>'
      +'<div class="field" style="max-width:120px"><label>지원금 (만원)</label><input data-ti="'+i+'" data-tk="support" value="'+esc(row.support)+'"></div>';
    d.querySelectorAll('input').forEach(function(el){el.addEventListener('input',function(){cfg.table[+this.dataset.ti][this.dataset.tk]=this.value;});});
    w.appendChild(d);
  });
}

/* ── 후기 흰색 ── */
function renderReviewsWhite(){
  var w=document.getElementById('reviews-white-wrap'); w.innerHTML='';
  (cfg.reviews_white||[]).forEach(function(r,i){ w.appendChild(makeReviewWhiteEl(r,i)); });
}
function makeReviewWhiteEl(r,i){
  var d=document.createElement('div'); d.className='review-item';
  d.innerHTML='<button class="review-del" onclick="delRW('+i+')">×</button>'
    +'<div class="row2" style="margin-bottom:8px">'
    +'<div class="field"><label>이니셜</label><input data-rwi="'+i+'" data-rwk="initial" value="'+esc(r.initial||'')+'"></div>'
    +'<div class="field"><label>태그 (선택)</label><input data-rwi="'+i+'" data-rwk="tag" value="'+esc(r.tag||'')+'"></div>'
    +'</div>'
    +'<div class="field"><label>후기 내용</label><textarea data-rwi="'+i+'" data-rwk="text" rows="2">'+esc(r.text||'')+'</textarea></div>'
    +'<div class="row2">'
    +'<div class="field"><label>닉네임</label><input data-rwi="'+i+'" data-rwk="name" value="'+esc(r.name||'')+'"></div>'
    +'<div class="field"><label>날짜·가입정보</label><input data-rwi="'+i+'" data-rwk="date" value="'+esc(r.date||'')+'"></div>'
    +'</div>';
  d.querySelectorAll('input,textarea').forEach(function(el){el.addEventListener('input',function(){cfg.reviews_white[+this.dataset.rwi][this.dataset.rwk]=this.value;});});
  return d;
}
function addReviewWhite(){cfg.reviews_white.push({initial:'',text:'',name:'',date:'',tag:''});renderReviewsWhite();}
function delRW(i){cfg.reviews_white.splice(i,1);renderReviewsWhite();}

/* ── 후기 노란색 ── */
function renderReviewsYellow(){
  var w=document.getElementById('reviews-yellow-wrap'); w.innerHTML='';
  (cfg.reviews_yellow||[]).forEach(function(r,i){ w.appendChild(makeReviewYellowEl(r,i)); });
}
function makeReviewYellowEl(r,i){
  var d=document.createElement('div'); d.className='review-item yellow-card';
  d.innerHTML='<button class="review-del" onclick="delRY('+i+')">×</button>'
    +'<div class="row2" style="margin-bottom:8px">'
    +'<div class="field"><label>이니셜</label><input data-ryi="'+i+'" data-ryk="initial" value="'+esc(r.initial||'')+'"></div>'
    +'<div class="field"><label>지역</label><input data-ryi="'+i+'" data-ryk="loc" value="'+esc(r.loc||'')+'"></div>'
    +'</div>'
    +'<div class="field"><label>따옴표 제목</label><input data-ryi="'+i+'" data-ryk="quote" value="'+esc(r.quote||'')+'"></div>'
    +'<div class="field"><label>후기 내용</label><textarea data-ryi="'+i+'" data-ryk="text" rows="2">'+esc(r.text||'')+'</textarea></div>'
    +'<div class="row2">'
    +'<div class="field"><label>이름</label><input data-ryi="'+i+'" data-ryk="name" value="'+esc(r.name||'')+'"></div>'
    +'<div class="field"><label>날짜·가입정보</label><input data-ryi="'+i+'" data-ryk="date" value="'+esc(r.date||'')+'"></div>'
    +'</div>';
  d.querySelectorAll('input,textarea').forEach(function(el){el.addEventListener('input',function(){cfg.reviews_yellow[+this.dataset.ryi][this.dataset.ryk]=this.value;});});
  return d;
}
function addReviewYellow(){cfg.reviews_yellow.push({initial:'',quote:'',loc:'',text:'',name:'',date:''});renderReviewsYellow();}
function delRY(i){cfg.reviews_yellow.splice(i,1);renderReviewsYellow();}

/* ── 실시간 접수 ── */
function renderRt(){
  var w=document.getElementById('rt-wrap'); w.innerHTML='';
  (cfg.rtDB||[]).forEach(function(row,i){ w.appendChild(makeRtEl(row,i)); });
}
function makeRtEl(row,i){
  var d=document.createElement('div'); d.className='rt-item';
  d.innerHTML='<input data-rti="'+i+'" data-rtk="name" value="'+esc(row.name||'')+'" placeholder="이름">'
    +'<input data-rti="'+i+'" data-rtk="phone" value="'+esc(row.phone||'')+'" placeholder="010-0***-****">'
    +'<input data-rti="'+i+'" data-rtk="carrier" value="'+esc(row.carrier||'')+'" placeholder="S*">'
    +'<button class="rt-del" onclick="delRt('+i+')">×</button>';
  d.querySelectorAll('input').forEach(function(el){el.addEventListener('input',function(){cfg.rtDB[+this.dataset.rti][this.dataset.rtk]=this.value;});});
  return d;
}
function addRt(){cfg.rtDB.push({name:'',phone:'',carrier:''});renderRt();}
function delRt(i){cfg.rtDB.splice(i,1);renderRt();}

/* ── config 수집 ── */
function collectConfig(){
  cfg.phone = document.getElementById('f-phone').value;
  cfg.hero.headline_em = document.getElementById('f-h1-em').value;
  cfg.hero.headline_mid = document.getElementById('f-h1-mid').value;
  cfg.hero.headline_strong = document.getElementById('f-h1-strong').value;
  cfg.hero.headline_end = document.getElementById('f-h1-end').value;
  cfg.hero.sub = document.getElementById('f-hero-sub').value;
  cfg.footer.biz_no = document.getElementById('f-biz-no').value;
  cfg.footer.sales_no = document.getElementById('f-sales-no').value;
  cfg.footer.address = document.getElementById('f-address').value;
  cfg.footer.copyright = document.getElementById('f-copyright').value;
  return cfg;
}

function buildConfigJs(){
  var c = collectConfig();
  return 'var SITE_CONFIG = ' + JSON.stringify(c, null, 2) + ';\n';
}

function downloadConfig(){
  var blob = new Blob([buildConfigJs()], {type:'text/javascript'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.js';
  a.click();
  showToast('config.js 다운로드 완료!');
}

function copyConfig(){
  navigator.clipboard.writeText(buildConfigJs()).then(function(){
    showToast('클립보드에 복사됐습니다!');
  });
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

init();
</script>
</body>
</html>
